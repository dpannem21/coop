services:
  coop:
    build: ./claude-code
    container_name: coop
    environment:
    - ANTHROPIC_AUTH_TOKEN=ollama
    - ANTHROPIC_API_KEY=""
    - ANTHROPIC_BASE_URL=http://host.docker.internal:11434
    hostname: coop
    stdin_open: true
    tty: true
    volumes:
    - ${CLAUDE}:/root/.claude
